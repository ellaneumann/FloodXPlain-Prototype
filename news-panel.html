════════════════════════════════════════════════════════════════════════════════
HOW THE NEWS SCRAPING WORKS
════════════════════════════════════════════════════════════════════════════════

The news tab combines two sources:

  1. LIVE AI FETCH (fetchNews in app.js)
     ─────────────────────────────────
     On page load (and when Refresh is clicked), the app sends a POST request
     to the Anthropic Claude API:

       POST https://api.anthropic.com/v1/messages

     The prompt instructs Claude to use its built-in web_search tool to find
     recent Atlanta flood and sewer news from today's date, then return the
     results as a strict JSON array — no extra text, just the array.

     Each article object has these fields:
       y     — publication year (number)
       title — headline
       src   — source name (e.g. "Atlanta Journal-Constitution")
       tag   — category label (e.g. "Flood", "CSO", "Policy", "Sinkhole")
       tc    — hex color for the tag badge (e.g. "#1565C0")
       sum   — 2-sentence summary shown in the collapsed card
       full  — 3–4 sentence detail shown when expanded
       url   — link to the original article

     The response text is searched with a regex (/\[\s*\{[\s\S]*?\}\s*\]/) to
     extract the JSON array even if Claude adds a preamble sentence.

     Results are cached in localStorage for the current date so page reloads
     within the same day do NOT re-call the API.

  2. STATIC ARCHIVE (STATIC_NEWS in data.js)
     ─────────────────────────────────────────
     A hand-curated array of significant historical Atlanta flood/sewer stories
     in the same article format. These are always shown, even if the live fetch
     fails. They cover major events: the 2009 100-year flood, the Peoplestown
     drainage lawsuit, the CSO consent decree, etc.

  RENDERING (renderNews in app.js)
  ──────────────────────────────────
  Both sources are merged into one array and sorted newest-first by year.
  Each article becomes an expandable .n-card:
    • Collapsed: year badge, tag badge, source name, headline, summary,
                 "Read more" button
    • Expanded:  full text + link to original source

  FAILURE HANDLING
  ─────────────────
  If the API call fails for any reason (network, auth, parse error), the catch
  block silently falls back to showing only STATIC_NEWS. The status dot in the
  header turns amber and the label reads "Archived reports" so users know.

  STATUS INDICATOR (setSt in app.js)
  ────────────────────────────────────
    Green  (#4CAF50) — live news fetched successfully today
    Amber  (#FFC107) — showing archived stories only
    Amber  (#FFC107) — fetch in progress

════════════════════════════════════════════════════════════════════════════════
HTML STRUCTURE
════════════════════════════════════════════════════════════════════════════════

  #tab-news .panel
    ├── .news-bar                 ← top toolbar (label + refresh button)
    │     ├── #news-label         ← e.g. "3 live + 8 archived" or "Fetching…"
    │     └── #rfbtn .rfbtn       ← Refresh button → calls fetchNews(true)
    └── .scroll #news-box         ← scrollable card list, populated by renderNews()
          └── (cards injected by JS — see renderNews() in app.js)

CSS classes used here are defined in the NEWS TAB section of styles.css.

════════════════════════════════════════════════════════════════════════════════
-->

<div class="panel" id="tab-news">

  <!-- Top bar: shows article count and a manual refresh button -->
  <div class="news-bar">
    <span id="news-label">Loading&#8230;</span>
    <button class="rfbtn" id="rfbtn" onclick="fetchNews(true)">Refresh</button>
  </div>

  <!-- Scrollable card list — emptied and rebuilt by renderNews() in app.js.
       The initial spinner is replaced as soon as fetchNews() resolves. -->
  <div class="scroll" id="news-box">
    <div style="padding:20px;text-align:center;font-size:11px;color:var(--g400)">
      <span class="spin"></span>Fetching&#8230;
    </div>
  </div>

</div>
